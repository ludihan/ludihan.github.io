{% extends "base.html" %}

{% block content %}
<h1 class="title">
  {{ section.title }}
</h1>
<ul>
  <!-- If you are using pagination, section.pages will be empty.
       You need to use the paginator object -->  
  {% for page in section.pages %}
  <li class="blog-item">
    <a href="{{ page.permalink | safe }}">~ {{ page.title | truncate(length=35, end="...") }}</a>
    <label>{{page.date | date(format="%d/%m/%Y")}}</label>
  </li>
  {% endfor %}
</ul>
{% endblock content %}
